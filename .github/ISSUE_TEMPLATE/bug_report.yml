name: Bug report
description: Report a reproducible problem with synthetic or openly shareable data
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Minimal reproduction
      description: Include a workflow and synthetic/open GeoJSON when possible.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
    validations:
      required: true
  - type: textarea
    id: gis
    attributes:
      label: GIS assumptions
      description: Geometry types, CRS, units, and relevant fields.
    validations:
      required: true
  - type: checkboxes
    id: data
    attributes:
      label: Data and security confirmation
      options:
        - label: I removed credentials, private data, and copyrighted source material.
          required: true
