version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    groups:
      public-python-dependencies:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "03:30"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    groups:
      public-ci-actions:
        patterns:
          - "*"
