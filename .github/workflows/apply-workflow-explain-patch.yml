name: Apply workflow explain patch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feature/workflow-explain
      - name: Verify and apply Workflow Explain patch
        shell: bash
        run: |
          set -euo pipefail
          cat .starshine-explain-patch/part-* > /tmp/explain.patch
          echo "b77fa07ec5856527eb61c3bcced31a9c508e1a5d98243ec79e819bb00e64ef0d  /tmp/explain.patch" | sha256sum -c -
          patch -p2 < /tmp/explain.patch
          rm -rf .starshine-explain-patch
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add deterministic workflow explanations"
          git push origin "HEAD:feature/workflow-explain"
