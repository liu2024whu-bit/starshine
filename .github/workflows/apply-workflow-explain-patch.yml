name: Apply workflow explain patch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feature/workflow-explain
      - name: Record final fragment checksums
        shell: bash
        run: |
          set -euo pipefail
          sha256sum .starshine-explain-patch/part-* > .starshine-explain-patch/diagnostics.txt
          cat .starshine-explain-patch/part-* > /tmp/explain.patch
          sha256sum /tmp/explain.patch >> .starshine-explain-patch/diagnostics.txt
          wc -c /tmp/explain.patch >> .starshine-explain-patch/diagnostics.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .starshine-explain-patch/diagnostics.txt
          if ! git diff --cached --quiet; then
            git commit -m "Inspect final Workflow Explain fragments"
            git push origin "HEAD:feature/workflow-explain"
          fi
