name: Apply geometry metrics patch

on:
  push:
    branches:
      - feature/projected-geometry-metrics

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply checksum-verified bundle
        shell: bash
        run: |
          set -euo pipefail
          cat .starshine-metrics-patch/part-* > /tmp/metrics.b64
          echo "500bdcc4a049769bdfaaadcca9571e47228089a8641eb261c7c9eb30e4803fab  /tmp/metrics.b64" | sha256sum -c -
          base64 --decode /tmp/metrics.b64 > /tmp/metrics.tar.gz
          echo "e03b7ce3728da4c48d5d89259a9d31fbbb4c347f789c43b3e05100c5071c067a  /tmp/metrics.tar.gz" | sha256sum -c -
          tar -xzf /tmp/metrics.tar.gz -C .
          rm -rf .starshine-metrics-patch
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add focused projected geometry metrics"
          git push origin "HEAD:${GITHUB_REF_NAME}"
