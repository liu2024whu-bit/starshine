name: Fix workflow contract wheel assertion

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feature/workflow-input-contracts
      - name: Align the smoke assertion with the synthetic workflow
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path("scripts/smoke_installed_wheel.py")
          text = path.read_text(encoding="utf-8")
          old = "`point_count` (collision policy: overwrite)"
          new = "`site_count` (collision policy: overwrite)"
          if text.count(old) != 1:
              raise SystemExit("expected exactly one outdated workflow-contract assertion")
          path.write_text(text.replace(old, new), encoding="utf-8")
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/smoke_installed_wheel.py
          git commit -m "Fix installed-wheel workflow contract assertion"
          git push origin "HEAD:feature/workflow-input-contracts"
