name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  repository-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python scripts/audit_public_repository.py

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: ruff check .
      - run: pytest

  geopackage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev,geopackage]"
      - run: ruff check .
      - run: pytest

  benchmark:
    needs: [repository-audit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m benchmarks.verify
      - run: python -m benchmarks.run --repeat 1 --output benchmark-report.json
      - run: python scripts/check_benchmark_report.py benchmark-report.json
      - uses: actions/upload-artifact@v4
        with:
          name: starshine-vector-benchmark
          path: benchmark-report.json
          if-no-files-found: error
          retention-days: 14

  build:
    needs: [repository-audit, test, geopackage, benchmark]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[release]"
      - run: python -m build
      - run: python -m twine check dist/*
      - run: python scripts/check_release_artifacts.py dist
      - uses: actions/upload-artifact@v4
        with:
          name: starshine-geo-dist
          path: dist/
          if-no-files-found: error
          retention-days: 14
