name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  repository-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python scripts/audit_public_repository.py

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: ruff check .
      - name: Run tests
        run: >-
          pytest -q --tb=short
          --junitxml=pytest-${{ matrix.python-version }}.xml
          2>&1 | tee pytest-${{ matrix.python-version }}.log
      - name: Upload test diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-failure-${{ matrix.python-version }}
          path: |
            pytest-${{ matrix.python-version }}.xml
            pytest-${{ matrix.python-version }}.log
          if-no-files-found: error
          retention-days: 7

  geopackage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev,geopackage]"
      - run: ruff check .
      - name: Run GeoPackage tests
        run: >-
          pytest -q --tb=short
          --junitxml=pytest-geopackage.xml
          2>&1 | tee pytest-geopackage.log
      - name: Upload GeoPackage test diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-failure-geopackage
          path: |
            pytest-geopackage.xml
            pytest-geopackage.log
          if-no-files-found: error
          retention-days: 7

  benchmark:
    needs: [repository-audit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m benchmarks.verify
      - run: python -m benchmarks.run --repeat 1 --output benchmark-report.json
      - run: python scripts/check_benchmark_report.py benchmark-report.json
      - uses: actions/upload-artifact@v4
        with:
          name: starshine-vector-benchmark
          path: benchmark-report.json
          if-no-files-found: error
          retention-days: 14

  build:
    needs: [repository-audit, test, geopackage, benchmark]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[release]"
      - run: python -m build
      - run: python -m twine check dist/*
      - name: Inspect release artifacts
        run: >-
          python scripts/check_release_artifacts.py dist
          2>&1 | tee release-artifact-check.log
      - name: Upload release inspection diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-artifact-inspection-failure
          path: |
            release-artifact-check.log
            dist/
          if-no-files-found: error
          retention-days: 7
      - uses: actions/upload-artifact@v4
        with:
          name: starshine-geo-dist
          path: dist/
          if-no-files-found: error
          retention-days: 14
      - uses: actions/upload-artifact@v4
        with:
          name: starshine-wheel-smoke-script
          path: scripts/smoke_installed_wheel.py
          if-no-files-found: error
          retention-days: 14

  wheel-smoke:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - uses: actions/download-artifact@v4
        with:
          name: starshine-geo-dist
          path: dist
      - uses: actions/download-artifact@v4
        with:
          name: starshine-wheel-smoke-script
          path: smoke
      - name: Install the built wheel
        shell: bash
        run: |
          set -o pipefail
          python -m pip install --upgrade pip \
            2>&1 | tee wheel-install-${{ matrix.python-version }}.log
          python -m pip install dist/*.whl \
            2>&1 | tee -a wheel-install-${{ matrix.python-version }}.log
      - name: Run installed-wheel smoke checks
        shell: bash
        run: |
          set -o pipefail
          script="$(find smoke -name smoke_installed_wheel.py -print -quit)"
          test -n "$script"
          python "$script" \
            2>&1 | tee wheel-smoke-${{ matrix.python-version }}.log
      - name: Upload wheel-smoke diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: wheel-smoke-failure-${{ matrix.python-version }}
          path: |
            wheel-install-${{ matrix.python-version }}.log
            wheel-smoke-${{ matrix.python-version }}.log
          if-no-files-found: warn
          retention-days: 7
