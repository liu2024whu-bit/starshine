name: Apply workflow graph patch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feature/workflow-graph-export-v1
      - name: Verify and apply graph bundle
        shell: bash
        run: |
          set -euo pipefail
          cat .starshine-graph-patch/part-* > /tmp/graph.b64
          echo "722b1e65a1802f75c07b1aabeaabbeba7bd4b05dc4e68d140c2b502b3ae3868a  /tmp/graph.b64" | sha256sum -c -
          base64 --decode /tmp/graph.b64 > /tmp/graph.tar.gz
          echo "46e7035c9aca4801972d259a7f16f79ce472143125348d2f9a1114da02c854c1  /tmp/graph.tar.gz" | sha256sum -c -
          tar -xzf /tmp/graph.tar.gz -C .
          rm -rf .starshine-graph-patch
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add deterministic workflow graph export"
          git push origin "HEAD:feature/workflow-graph-export-v1"
