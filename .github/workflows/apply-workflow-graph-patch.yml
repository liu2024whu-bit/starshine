name: Apply workflow graph patch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feature/workflow-graph-export-v1
      - name: Record graph patch checksums
        shell: bash
        run: |
          set -euo pipefail
          sha256sum .starshine-graph-patch/part-* > .starshine-graph-patch/diagnostics.txt
          cat .starshine-graph-patch/part-* > /tmp/graph.b64
          sha256sum /tmp/graph.b64 >> .starshine-graph-patch/diagnostics.txt
          wc -c /tmp/graph.b64 >> .starshine-graph-patch/diagnostics.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .starshine-graph-patch/diagnostics.txt
          git commit -m "Record workflow graph patch checksums"
          git push origin "HEAD:feature/workflow-graph-export-v1"
