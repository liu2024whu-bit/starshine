name: Diagnose workflow graph patch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feature/workflow-graph-export
      - name: Record bundle diagnostics
        shell: bash
        run: |
          set -u
          {
            sha256sum .starshine-graph-patch/bundle.tar.gz
            wc -c .starshine-graph-patch/bundle.tar.gz
            tar -tzf .starshine-graph-patch/bundle.tar.gz
            echo "tar_status=$?"
          } > .starshine-graph-patch/diagnostics.txt 2>&1
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .starshine-graph-patch/diagnostics.txt
          git commit -m "Record workflow graph bundle diagnostics"
          git push origin "HEAD:feature/workflow-graph-export"
