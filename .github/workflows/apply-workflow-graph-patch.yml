name: Diagnose workflow graph patch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/workflow-graph-export
      - name: Record graph bundle diagnostics
        shell: bash
        run: |
          {
            sha256sum .starshine-graph-patch/bundle.tar.gz
            wc -c .starshine-graph-patch/bundle.tar.gz
            file .starshine-graph-patch/bundle.tar.gz
            tar -tzf .starshine-graph-patch/bundle.tar.gz
            echo "tar_status=$?"
          } > graph-bundle-diagnostics.txt 2>&1
          cat graph-bundle-diagnostics.txt
      - uses: actions/upload-artifact@v4
        with:
          name: graph-bundle-diagnostics
          path: graph-bundle-diagnostics.txt
