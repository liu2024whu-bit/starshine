name: Diagnose spatial join patch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}
      - name: Record patch checksums
        shell: bash
        env:
          TARGET_BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          sha256sum .starshine-patch/part-* > .starshine-patch/checksums.txt
          cat .starshine-patch/part-* | sha256sum >> .starshine-patch/checksums.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .starshine-patch/checksums.txt
          git commit -m "Record spatial join patch checksums"
          git push origin "HEAD:${TARGET_BRANCH}"
