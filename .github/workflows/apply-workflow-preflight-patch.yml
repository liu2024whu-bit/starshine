name: Apply workflow input preflight patch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feature/workflow-input-preflight
      - name: Verify and apply preflight bundle
        shell: bash
        run: |
          set -euo pipefail
          cat .starshine-preflight-patch/part-* > /tmp/preflight.b64
          echo "504e636acecdd154b714e077b78fc57807aa4e6127540040dfeca467f4a8e458  /tmp/preflight.b64" | sha256sum -c -
          base64 --decode /tmp/preflight.b64 > /tmp/preflight.tar.gz
          echo "28d0314f2af361ba5bba5d6a649ca246aef9aa8ace90ffae403060614791757a  /tmp/preflight.tar.gz" | sha256sum -c -
          tar -xzf /tmp/preflight.tar.gz -C .
          rm -rf .starshine-preflight-patch
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add actual workflow input preflight"
          git push origin "HEAD:feature/workflow-input-preflight"
